---
min_ansible_version: 2.12.1
# Set default value for reboot value
change_requires_reboot: false
# The role discovers dynamically (in tasks/main.yml) whether it
# is executed on a container image and sets the variable
# system_is_container the true. Otherwise, the default value
# 'false' is left unchanged.
system_is_container: false

# Used to control warning summary
warn_control_list: ""
warn_count: 0

# Aide initiate command for new DB creation
aide_initiate_command: aideinit -y -f

# Audit vars
audit_bins:
  - /sbin/auditctl
  - /sbin/aureport
  - /sbin/ausearch
  - /sbin/autrace
  - /sbin/auditd
  - /sbin/augenrules

# ==============================================================================
# CIS Benchmark Overrides for Azure Ubuntu 24.04 VMs
# ==============================================================================

# --- 1. Filesystem ---
ubtu24cis_rule_1_1_1_7: false   # cramfs — not relevant for cloud VMs
ubtu24cis_rule_1_1_1_10: false  # squashfs — snap depends on it

# --- 2. Bootloader ---
ubtu24cis_rule_1_4_1: false     # UEFI boot password — N/A for cloud VMs

# --- 3. Banners ---
ubtu24cis_rule_1_6_4: false     # /etc/motd permissions — Ubuntu uses dynamic MOTD

# --- 4. Legacy Services (don't exist on cloud images) ---
ubtu24cis_rule_2_1_1: false     # autofs (Automount)
ubtu24cis_rule_2_1_2: false     # avahi-daemon (Bonjour/Zeroconf)
ubtu24cis_rule_2_1_3: false     # isc-dhcp-server (DHCP Server)
ubtu24cis_rule_2_1_4: false     # slapd (LDAP Server)
ubtu24cis_rule_2_1_5: false     # ypserv (NIS Server)
# ubtu24cis_rule_2_1_6: false   # cups (Print Server) - Let Ansible remove it for USG
ubtu24cis_rule_2_1_7: false     # rpcbind (RPC)
ubtu24cis_rule_2_1_8: false     # rsync (Rsync Daemon)
ubtu24cis_rule_2_1_9: false     # nfs-server (NFS)
ubtu24cis_rule_2_1_10: false    # vsftpd (FTP Server)
ubtu24cis_rule_2_1_12: false    # dovecot/cyrus (IMAP/POP3 Mail Server)
ubtu24cis_rule_2_1_13: false    # smbd (Samba/SMB File Server)
ubtu24cis_rule_2_1_14: false    # squid (HTTP Proxy)
ubtu24cis_rule_2_1_15: false    # snmpd (SNMP Server)
ubtu24cis_rule_2_1_21: false    # Postfix MTA — absent on cloud VMs
ubtu24cis_rule_2_1_22: false    # NIS — absent on Azure
# ubtu24cis_rule_2_1_11: false  # Uncomment if you run a web server (Nginx/Apache)

# Enable purging of xinetd, prelink, and other legacy packages explicitly to satisfy USG
ubtu24cis_purge_apt: true
ubtu24cis_xinetd_server: false
ubtu24cis_prelink_disable: true

# --- 5. Time Synchronization (Azure uses Chrony) ---
ubtu24cis_time_sync_tool: chrony          # FIXED: was 'ubtu24cis_time_synchronization' (ignored)
ubtu24cis_rule_2_3_2_2: false             # Skip systemd-timesyncd masking

# --- 6. Authentication (SSH keys, no local passwords) ---
ubtu24cis_rule_5_2_4: false     # Skip NOPASSWD sudoers check — using SSH key auth
ubtu24cis_rule_5_2_5: false     # Skip re-auth for privilege escalation — automation user

# --- 7. Dotfiles ---
ubtu24cis_rule_7_2_10: false    # Skip dot file permission enforcement

# --- 8. Logging (systemd-journal-remote absent on cloud images) ---
ubtu24cis_rule_6_1_2_1_1: false   # Skip systemd-journal-remote installation check
ubtu24cis_rule_6_1_2_1_2: false   # Skip systemd-journal-upload configuration
ubtu24cis_rule_6_1_2_1_3: false   # Skip enabling the missing journal-upload service
ubtu24cis_rule_6_1_2_1_4: false   # Skip enabling the missing journal-remote service

# --- 9. PAM - Ensure nullok is not permitted ---
ubtu24cis_pam_unix_nullok: false  # Default in role; explicitly disabled

# --- 10. AIDE Timeout ---
ubtu24cis_aide_init_async: 1800   # Increase AIDE init timeout to 30 mins (default 600s is too short)
ubtu24cis_aide_init_poll: 10
ubtu24cis_aide_scan: timer        # USG profile strictly expects systemd timer instead of cron

# --- 11. USG-Specific Networking Overrides ---
# USG scanner looks strictly in /etc/sysctl.conf instead of /etc/sysctl.d/98_cis_kernel.conf
ubtu24cis_sysctl_kernel_conf: /etc/sysctl.conf
ubtu24cis_sysctl_network_conf: /etc/sysctl.conf

# --- 12. Firewall ---
# NOTE: USG expects nftables but this Ansible role does NOT support nftables
# (tasks are commented out). Keeping UFW which the role manages correctly.
# The USG nftables failures (4.3.x) are expected and can be ignored.
# ubtu24cis_firewall_package: ufw  # Default - no override needed

# --- 13. PAM - Enable faillock, pwhistory, and pwquality modules ---
ubtu24cis_pam_create_faillock_files: true
ubtu24cis_pam_auth_faillock: true
ubtu24cis_pam_create_pwhistory_files: true
ubtu24cis_pam_auth_pwhistory: true
ubtu24cis_pam_create_pwquality_files: true
ubtu24cis_pam_auth_pwquality: true
ubtu24cis_pam_create_pamunix_file: true
ubtu24cis_pam_auth_unix: true

# --- 14. Force AIDE DB recreation to fix aidecheck service ---
ubtu24cis_aide_db_recreate: true
