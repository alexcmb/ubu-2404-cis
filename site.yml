---

- name: Run CIS benchmark
  hosts: all
  become: true
  roles:
    - role: "{{ playbook_dir }}"
  post_tasks:
    # --- PWQuality: Merge drop-ins into main file for USG ---
    - name: USG Override - Assemble pwquality.conf.d drop-ins into the main pwquality.conf file
      ansible.builtin.assemble:
        src: /etc/security/pwquality.conf.d
        dest: /etc/security/pwquality.conf
        owner: root
        group: root
        mode: '0644'
      ignore_errors: true

    # --- File Ownership: USG expects group 'root' on these files ---
    - name: USG Override - Fix /etc/passwd group ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - /etc/passwd
        - /etc/group
        - /etc/shells
      ignore_errors: true

    - name: USG Override - Fix /etc/passwd- backup group ownership
      ansible.builtin.file:
        path: /etc/passwd-
        owner: root
        group: root
        mode: '0600'
      ignore_errors: true

    - name: USG Override - Fix /etc/at.allow ownership
      ansible.builtin.file:
        path: /etc/at.allow
        owner: root
        group: root
        mode: '0640'
      ignore_errors: true

    # --- SSH: Fix sshd_config group ownership ---
    - name: USG Override - Fix /etc/ssh/sshd_config group ownership
      ansible.builtin.file:
        path: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: '0600'
      ignore_errors: true

    # --- /var/log/apt: Fix ownership ---
    - name: USG Override - Fix /var/log/apt files ownership
      ansible.builtin.shell: chown -R root:root /var/log/apt/
      ignore_errors: true

    # --- Audit: Fix log directory permissions ---
    - name: USG Override - Fix /var/log/audit directory mode
      ansible.builtin.file:
        path: /var/log/audit
        mode: '0750'
        state: directory
      ignore_errors: true

    # --- Journald: Set Storage=persistent in main config for USG ---
    - name: USG Override - Ensure journald Storage=persistent in main config
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=persistent'
      notify: Restart journald
      ignore_errors: true

    # --- Bluetooth: Disable service ---
    - name: USG Override - Disable Bluetooth service
      ansible.builtin.systemd:
        name: bluetooth
        enabled: false
        state: stopped
        masked: true
      ignore_errors: true

    # --- Rsync: Disable rsyncd service ---
    - name: USG Override - Disable rsyncd service
      ansible.builtin.systemd:
        name: rsync
        enabled: false
        state: stopped
        masked: true
      ignore_errors: true

    # --- Sysctl: Fix rp_filter conflict ---
    # /etc/sysctl.d/10-network-security.conf sets rp_filter=2 which overrides our =1
    - name: USG Override - Fix rp_filter in 10-network-security.conf
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/10-network-security.conf
        regexp: '{{ item.regexp }}'
        line: '{{ item.line }}'
      loop:
        - { regexp: '^net.ipv4.conf.default.rp_filter', line: 'net.ipv4.conf.default.rp_filter=1' }
        - { regexp: '^net.ipv4.conf.all.rp_filter', line: 'net.ipv4.conf.all.rp_filter=1' }
      ignore_errors: true

    - name: USG Override - Reload sysctl
      ansible.builtin.command: sysctl --system
      ignore_errors: true

    # --- PAM: Run pam-auth-update to properly enable faillock and pwhistory ---
    - name: USG Override - Enable pam_faillock via pam-auth-update
      ansible.builtin.command: pam-auth-update --enable faillock
      ignore_errors: true

    - name: USG Override - Enable pam_faillock_notify via pam-auth-update
      ansible.builtin.command: pam-auth-update --enable faillock_notify
      ignore_errors: true

    - name: USG Override - Enable pam_pwhistory via pam-auth-update
      ansible.builtin.command: pam-auth-update --enable pwhistory
      ignore_errors: true

    - name: USG Override - Enable pam_pwquality via pam-auth-update
      ansible.builtin.command: pam-auth-update --enable pwquality
      ignore_errors: true

    # --- File Permissions: Fix /etc/group- and shadow backups ---
    - name: USG Override - Fix backup file permissions
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: '0600'
      loop:
        - /etc/group-
        - /etc/gshadow-
        - /etc/shadow-
      ignore_errors: true

    # --- GRUB: Fix ownership ---
    - name: USG Override - Fix /boot/grub/grub.cfg ownership
      ansible.builtin.file:
        path: /boot/grub/grub.cfg
        owner: root
        group: root
        mode: '0600'
      ignore_errors: true

  handlers:
    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
