---
# ============================================================================
# UBUNTU 24 CIS LEVEL 1 COMPLIANCE - SAMPLE CONFIGURATION
# ============================================================================
# This configuration file enables ONLY Level 1 controls for server environments.
# Copy this file to group_vars/all/cis_level1_config.yml or use as extra vars.
# 
# Usage:
#   ansible-playbook -i inventory.yml site.yml --tags "level1-server" -e @cis_level1_config.yml
# ============================================================================

# ===================
# LEVEL SELECTION
# ===================
# Enable Level 1, explicitly disable Level 2
ubtu24cis_level_1: true
ubtu24cis_level_2: false

# ===================
# SECTION TOGGLES
# ===================
# Enable all sections for complete Level 1 compliance
ubtu24cis_section1: true  # Initial Setup (Filesystem, Boot, MAC)
ubtu24cis_section2: true  # Services
ubtu24cis_section3: true  # Network Configuration
ubtu24cis_section4: true  # Host Based Firewall
ubtu24cis_section5: true  # Access Control (SSH, sudo, PAM)
ubtu24cis_section6: true  # Logging and Auditing
ubtu24cis_section7: true  # System Maintenance

# ===================
# SAFETY SETTINGS
# ===================
# Disable highly disruptive tasks on first run
ubtu24cis_disruption_high: false

# Skip automatic reboot (manually reboot after reviewing changes)
skip_reboot: true

# Root user settings
ubtu24cis_uses_root: false

# ===================
# SYSTEM TYPE
# ===================
# Set to true if this is a router
ubtu24cis_is_router: false

# Desktop environment required?
ubtu24cis_desktop_required: false

# ===================
# NETWORK
# ===================
# IPv4/IPv6 requirements
ubtu24cis_ipv4_required: true
ubtu24cis_ipv6_required: false  # Set to true if IPv6 is needed

# Method to disable IPv6 (grub or sysctl)
ubtu24cis_ipv6_disable: grub

# Install Network Manager (required for wireless interface check)
ubtu24cis_install_network_manager: true

# Bluetooth (false to remove, mask to keep but disable)
ubtu24cis_bluetooth_service: false
ubtu24cis_bluetooth_mask: false

# ===================
# FIREWALL
# ===================
# Firewall package: ufw, iptables, nftables, or none
ubtu24cis_firewall_package: "ufw"
ubtu24cis_ufw_use_sysctl: true

# UFW allowed outbound ports (customize for your environment)
ubtu24cis_ufw_allow_out_ports:
  - port: 22    # SSH
    proto: tcp
  - port: 53    # DNS
    proto: tcp
  - port: 53    # DNS
    proto: udp
  - port: 80    # HTTP
    proto: tcp
  - port: 443   # HTTPS
    proto: tcp
  - port: 123   # NTP
    proto: udp

# ===================
# TIME SYNC
# ===================
# Time synchronization tool: chrony or systemd-timesyncd
ubtu24cis_time_sync_tool: "systemd-timesyncd"

# NTP Time Servers
ubtu24cis_time_servers:
  - name: time-a-g.nist.gov
    options: iburst
  - name: time-b-g.nist.gov
    options: iburst
  - name: time-c-g.nist.gov
    options: iburst

# NTP Pools
ubtu24cis_time_pool:
  - name: time.nist.gov
    options: iburst maxsources 4

# ===================
# SSH HARDENING
# ===================
ubtu24cis_sshd_log_level: "INFO"
ubtu24cis_sshd_max_auth_tries: 4
ubtu24cis_sshd_max_sessions: 10
ubtu24cis_sshd_login_grace_time: 60
ubtu24cis_sshd_client_alive_interval: 300
ubtu24cis_sshd_client_alive_count_max: 3

# SSH Access Control (leave empty for no restrictions, or set specific values)
ubtu24cis_sshd_allow_users: ""
ubtu24cis_sshd_allow_groups: ""
ubtu24cis_sshd_deny_users: ""
ubtu24cis_sshd_deny_groups: ""

# SSH Ciphers (FIPS 140 compliant)
ubtu24cis_sshd_ciphers:
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr
  - aes192-ctr
  - aes128-ctr

ubtu24cis_sshd_macs:
  - hmac-sha1
  - hmac-sha2-256
  - hmac-sha2-512

ubtu24cis_sshd_kex_algorithms:
  - ecdh-sha2-nistp256
  - ecdh-sha2-nistp384
  - ecdh-sha2-nistp521
  - diffie-hellman-group-exchange-sha256
  - diffie-hellman-group16-sha512
  - diffie-hellman-group18-sha512
  - diffie-hellman-group14-sha256

# ===================
# SUDO CONFIGURATION
# ===================
ubtu24cis_sudo_package: "sudo"
ubtu24cis_sudo_logfile: "/var/log/sudo.log"
ubtu24cis_sudo_timestamp_timeout: 15
ubtu24cis_sugroup: nosugroup

# Users excluded from NOPASSWD check (e.g., automation accounts)
ubtu24cis_sudoers_exclude_nopasswd_list:
  - ec2-user
  - vagrant
  - ansible_admin  # Add your ansible user here

# ===================
# PASSWORD POLICY
# ===================
# Password Aging
ubtu24cis_pass_max_days: 365   # Maximum password age
ubtu24cis_pass_min_days: 1     # Minimum days between password changes
ubtu24cis_pass_warn_age: 7     # Days before expiry to warn user
ubtu24cis_pass_inactive: 45    # Days of inactivity before account lock

# Password Quality
ubtu24cis_passwd_minlen_value: 14     # Minimum password length
ubtu24cis_passwd_difok_value: 2       # Minimum different characters from old password
ubtu24cis_passwd_minclass: 4          # Required character classes
ubtu24cis_passwd_dcredit: -1          # Required digits
ubtu24cis_passwd_ucredit: -2          # Required uppercase
ubtu24cis_passwd_ocredit: -1          # Required special characters
ubtu24cis_passwd_lcredit: -2          # Required lowercase
ubtu24cis_passwd_maxrepeat_value: 3   # Max consecutive repeated characters
ubtu24cis_passwd_maxsequence_value: 3 # Max sequential characters
ubtu24cis_passwd_dictcheck_value: 1   # Dictionary check enabled
ubtu24cis_passwd_quality_enforce_value: 1

# Password History
ubtu24cis_pamd_pwhistory_remember: 24  # Remember last 24 passwords

# Password Hashing
ubtu24cis_passwd_hash_algo: yescrypt

# Account Lockout (pam_faillock)
ubtu24cis_faillock_deny: 5             # Attempts before lockout
ubtu24cis_faillock_unlock_time: 900    # Lockout duration in seconds (15 min)

# ===================
# SERVICES TO DISABLE
# ===================
# Set to false to remove/disable, true to keep, mask to disable but not remove

# Server Services
ubtu24cis_autofs_services: false
ubtu24cis_avahi_server: false
ubtu24cis_dhcp_server: false
ubtu24cis_dns_server: false
ubtu24cis_dnsmasq_server: false
ubtu24cis_ftp_server: false
ubtu24cis_ldap_server: false
ubtu24cis_message_server: false
ubtu24cis_nfs_server: false
ubtu24cis_nis_server: false
ubtu24cis_print_server: false
ubtu24cis_rpc_server: false
ubtu24cis_rsync_server: false
ubtu24cis_samba_server: false
ubtu24cis_snmp_server: false
ubtu24cis_telnet_server: false
ubtu24cis_tftp_server: false
ubtu24cis_squid_server: false
ubtu24cis_apache2_server: false
ubtu24cis_nginx_server: false
ubtu24cis_xinetd_server: false
ubtu24cis_xwindow_server: false
ubtu24cis_is_mail_server: false

# Client Services
ubtu24cis_nis_client_required: false
ubtu24cis_rsh_client: false
ubtu24cis_talk_client: false
ubtu24cis_telnet_required: false
ubtu24cis_ldap_clients_required: false
ubtu24cis_ftp_client: false

# ===================
# WARNING BANNERS
# ===================
ubtu24cis_warning_banner: |
    ***************************************************************************
                              AUTHORIZED ACCESS ONLY
    ***************************************************************************
    This system is the property of [YOUR ORGANIZATION].
    Unauthorized access to this system is prohibited.
    All activities may be monitored and recorded.
    By accessing this system, you consent to such monitoring.
    ***************************************************************************

ubtu24cis_disable_dynamic_motd: true

# ===================
# LOGGING
# ===================
# Syslog service: journald or rsyslog
ubtu24cis_syslog_service: 'journald'

# Remote log server (for remote logging)
ubtu24cis_remote_log_server: 192.168.2.100
ubtu24cis_system_is_log_server: false

# Log rotation
ubtu24cis_logrotate: "daily"

# ===================
# AUDITD
# ===================
ubtu24cis_audit_back_log_limit: 8192
ubtu24cis_max_log_file_size: 10
ubtu24cis_auditd_max_log_file_action: keep_logs
ubtu24cis_auditd_space_left_action: email
ubtu24cis_auditd_admin_space_left_action: halt
ubtu24cis_auditd_disk_full_action: halt
ubtu24cis_auditd_disk_error_action: syslog

# ===================
# AIDE (File Integrity)
# ===================
# IMPORTANT: Ubuntu 24.04 does NOT provide aidecheck.service/aidecheck.timer
# You must create them manually. See README-CIS-LVL1.md for instructions.
ubtu24cis_config_aide: true

# Scan method: 'cron' or 'timer' (recommend 'timer' for systemd-based scheduling)
# Note: If using 'timer', you must create aidecheck.service and aidecheck.timer manually
ubtu24cis_aide_scan: timer

# Cron schedule (only used if ubtu24cis_aide_scan: cron)
ubtu24cis_aide_cron_user: root
ubtu24cis_aide_cron_hour: 5
ubtu24cis_aide_cron_minute: 0
ubtu24cis_aide_cron_day: '*'
ubtu24cis_aide_cron_month: '*'
ubtu24cis_aide_cron_weekday: '*'

# Database settings
ubtu24cis_aide_db_file: /var/lib/aide/aide.db
ubtu24cis_aide_db_file_age: 1w  # Rebuild if older than 1 week
ubtu24cis_aide_db_recreate: false

# Initialization timeout (AIDE init can take a while on large systems)
ubtu24cis_aide_init_async: 600    # Max seconds to wait
ubtu24cis_aide_init_poll: 15      # Polling interval in seconds

# ===================
# AUDITING (Goss-based)
# ===================
# Set to true to run compliance audit after remediation
run_audit: false
setup_audit: false
audit_only: false

# ===================
# SCREEN LOCK / TIMEOUT
# ===================
ubtu24cis_shell_session_timeout: 900   # 15 minutes
ubtu24cis_screensaver_idle_delay: 900
ubtu24cis_screensaver_lock_delay: 5

# ===================
# UMASK
# ===================
ubtu24cis_bash_umask: '027'
ubtu24cis_root_umask: '0027'
