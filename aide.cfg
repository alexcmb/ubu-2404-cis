# ============================
# AIDE CONFIGURATION
# Compatible Ubuntu 24.04 + CIS + Azure
# ============================

@@x_include_setenv UPAC_settingsd /etc/aide/aide.settings.d
@@x_include_setenv PATH /bin:/usr/bin

database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new
gzip_dbout=yes

report_ignore_e2fsattrs=VNIE

Checksums = H
database_attrs = Checksums

OwnerMode = p+u+g+ftype
Size = s+b
InodeData = OwnerMode+n+i+Size+l+X
StaticFile = m+c+Checksums
Full = InodeData+StaticFile
VarTime = InodeData+Checksums
VarInode = VarTime-i
VarFile = OwnerMode+n+l+X
VarDir = OwnerMode+n+i+X
RecreatedDir = OwnerMode+n+X
RamdiskData = InodeData-i
VarDirInode = RecreatedDir
VarDirTime = InodeData

# ============================
# LOG HANDLING
# ============================

ActLog = Full+growing+ANF+I
RotLog = Full
CompSerLog = Full+I+compressed
MidlSerLog = Full+I
LastSerLog = Full+ARF

Log = OwnerMode+n+growing+s+X
FreqRotLog = Log-growing-s
LowLog = Log-growing-s
LoSerMemberLog = Full+I+ANF
SerMemberLog  = Full+I
HiSerMemberLog = Full+I+ARF
LowDELog = SerMemberLog+ANF+ARF
SerMemberDELog = Full+ANF
LinkedLog = Log-n

@@x_include /etc/aide/aide.conf.d ^[a-zA-Z0-9_-]+$

# ============================
# CIS - Audit tools
# ============================

/usr/sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
/usr/sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
/usr/sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512
/usr/sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
/usr/sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
/usr/sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512

# ============================
# VOLATILE FILE EXCLUSIONS
# ============================

# Systemd runtime (volatile)
!/run/systemd/dynamic-uid
!/run/systemd/dynamic-uid/.*
!/run/systemd/propagate/systemd-journal-upload.service
!/run/faillock/.*

# Systemd private data
!/var/lib/private/systemd/journal-upload
!/var/lib/private/systemd/journal-upload/.*

# Logging (rotated frequently)
!/var/log/sudo.log
!/var/log/audit/audit.log
!/var/log/audit/audit.log.*
!/var/log/journal/.*

# Azure Agent (Azure VMs)
!/var/lib/waagent/.*
!/var/log/waagent.log

# Sysstat
!/var/log/sysstat/.*
!/var/log/sa/.*

# Ubuntu Security Guide (USG)
!/var/lib/usg/.*
!/tmp/usg-.*\.html
!/tmp/usg-.*\.xml
!/var/lib/usg
!/var/log/usg.log

# Systemd timers
!/var/lib/systemd/timers/.*

# Canonical Livepatch
!/var/snap/canonical-livepatch/common/.*



